<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Psi Eteen</title>
  <link rel="stylesheet" href="style.css">
  <!-- Quill Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Psi Eteen</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Writing</a></li>
        <li><button onclick="logout()" class="logout-btn">Logout</button></li>
      </ul>
    </div>
  </nav>

  <main class="admin-container">
    <h1>Admin Panel</h1>

    <section class="admin-section">
      <h3 id="form-title">Create New Post</h3>
      
      <input type="hidden" id="editing-id" value="">
      
      <input type="text" id="title" placeholder="Post Title" class="admin-input">
      <input type="text" id="slug" placeholder="url-friendly-slug" class="admin-input">
      
      <select id="type" class="admin-select">
        <option value="writing">Writing</option>
        <option value="poetry">Poetry</option>
      </select>

      <select id="status" class="admin-select">
  <option value="draft">Draft</option>
  <option value="published">Published</option>
</select>

 <div id="editor-container" style="min-height: 350px; margin-bottom: 1rem;"></div>     
      
      <div class="admin-form-actions">
        <button onclick="submitPost()" class="admin-btn" id="submit-btn">Publish Post</button>
        <button onclick="cancelEdit()" class="admin-btn secondary" id="cancel-btn" style="display: none;">Cancel</button>
      </div>
    </section>

    <section class="admin-section">
      <h3>Manage Posts</h3>
      <div id="admin-posts"></div>
    </section>
  </main>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>

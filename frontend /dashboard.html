<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Psi Eteen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Psi Eteen</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Writing</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><button onclick="logout()" class="logout-btn">Logout</button></li>
      </ul>
    </div>
  </nav>

  <main class="dashboard-container">
    <h1>Dashboard</h1>
    
    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="total-posts">—</div>
        <div class="stat-label">Total Posts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="published-posts">—</div>
        <div class="stat-label">Published</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="draft-posts">—</div>
        <div class="stat-label">Drafts</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-value" id="total-views">—</div>
        <div class="stat-label">Total Views</div>
      </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <a href="admin.html" class="dashboard-btn primary">✏️ New Post</a>
      <a href="admin.html" class="dashboard-btn secondary">📋 Manage Posts</a>
      <a href="index.html" class="dashboard-btn secondary">👁️ View Site</a>
    </div>
    
    <!-- Drafts Reminder -->
    <section class="dashboard-section" id="drafts-reminder" style="display: none;">
      <div class="drafts-header">
        <h2>📋 You have drafts waiting</h2>
      </div>
      <div id="drafts-list" class="drafts-list"></div>
    </section>
    
    <!-- Most Viewed Posts -->
    <section class="dashboard-section">
      <h2>🔥 Most Viewed</h2>
      <div id="most-viewed" class="recent-list"></div>
    </section>
    
    <!-- Recent Posts -->
    <section class="dashboard-section">
      <h2>📄 Recent Posts</h2>
      <div id="recent-posts" class="recent-list"></div>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
